<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>CASEY'S HOMEPAGE</title>
    <link rel="icon" href="/assets/icon.png" type="image/png">
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #1d1d1f;
            --accent-color: #007aff;
            --waveform-color: #64d2ff;
            --border-color: rgba(0, 0, 0, 0.1);
            --card-radius: 24px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: rgba(30, 30, 32, 0.9);
                --text-color: #f5f5f7;
                --accent-color: #007aff;
                --border-color: rgba(255, 255, 255, 0.15);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--card-radius);
            padding: 20px;
            width: 100%;
        }

        .ui-btn {
            cursor: pointer;
            border: 1px solid var(--border-color);
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border-radius: 14px;
            text-decoration: none;
        }

        @media (hover: hover) {

            .ui-btn:hover,
            .search-btn:hover {
                background-color: var(--accent-color);
                color: white;
                border-color: transparent;
                transform: translateY(-2px);
                box-shadow: 0 6px 15px rgba(0, 122, 255, 0.25);
            }
        }

        .ui-btn:active,
        .search-btn:active {
            transform: scale(0.96);
        }

        .header-inner {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .search-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.03);
            color: var(--text-color);
            outline: none;
            font-size: 14px;
        }

        @media (prefers-color-scheme: dark) {
            .search-input {
                background: rgba(255, 255, 255, 0.05);
            }
        }

        .search-buttons-row {
            display: flex;
            gap: 6px;
        }

        .search-btn {
            flex: 1;
            padding: 8px 0;
            border: none;
            border-radius: 10px;
            background: var(--accent-color);
            color: white;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .player-title {
            font-size: 15px;
            font-weight: 700;
        }

        .player-status {
            font-size: 11px;
            opacity: 0.7;
            font-weight: 600;
            text-transform: uppercase;
        }

        .player-content-grid {
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            gap: 15px;
        }

        .visualizer-box {
            background: rgba(0, 0, 0, 0.03);
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }

        @media (prefers-color-scheme: dark) {
            .visualizer-box {
                background: rgba(255, 255, 255, 0.05);
            }
        }

        .visualizer {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 30px;
            opacity: 0;
        }

        .visualizer.active {
            opacity: 1;
        }

        .bar {
            width: 4px;
            height: 6px;
            border-radius: 2px;
            background-color: var(--waveform-color);
        }

        .active .bar {
            animation: fluctuate 0.6s infinite alternate ease-in-out;
        }

        .bar:nth-child(1) {
            animation-delay: 0.0s;
        }

        .bar:nth-child(2) {
            animation-delay: 0.2s;
        }

        .bar:nth-child(3) {
            animation-delay: 0.4s;
        }

        .bar:nth-child(4) {
            animation-delay: 0.1s;
        }

        .bar:nth-child(5) {
            animation-delay: 0.3s;
        }

        .bar:nth-child(6) {
            animation-delay: 0.5s;
        }

        @keyframes fluctuate {
            0% {
                height: 6px;
                opacity: 0.5;
            }

            100% {
                height: 36px;
                opacity: 1;
            }
        }

        .radio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .radio-btn.active {
            background: var(--accent-color) !important;
            color: white !important;
            border-color: transparent;
        }

        .links-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        footer {
            margin-top: 40px;
            padding-bottom: 20px;
            text-align: center;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .blink {
            animation: flash 1s infinite;
        }

        @keyframes flash {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="glass-card">
            <div class="header-inner">
                <div class="logo-container">
                    <img src="/assets/logo.png" alt="Logo" class="logo"
                        onerror="this.src='https://via.placeholder.com/65?text=LOGO'">
                </div>
                <div class="search-area">
                    <input type="text" id="searchInput" class="search-input" placeholder="...">
                    <div class="search-buttons-row">
                        <button class="search-btn" onclick="search('bing')">BING</button>
                        <button class="search-btn" onclick="search('baidu')">BAIDU</button>
                        <button class="search-btn" onclick="search('google')">GOOGLE</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="glass-card">
            <div class="player-header">
                <div class="player-title">PLAYER</div>
                <div id="status" class="player-status">READY</div>
            </div>
            <div class="player-content-grid">
                <div class="visualizer-box">
                    <div id="visualizer" class="visualizer">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                </div>
                <div class="radio-grid">
                    <button class="ui-btn radio-btn"
                        onclick="playRadio('CAFE', 'https://strm112.1.fm/caferadio_mobile_mp3', this)">CAFE</button>
                    <button class="ui-btn radio-btn"
                        onclick="playRadio('JAZZ', 'https://strm112.1.fm/ajazz_mobile_mp3', this)">JAZZ</button>
                    <button class="ui-btn radio-btn"
                        onclick="playRadio('CHILLOUT', 'https://strm112.1.fm/chilloutlounge_mobile_mp3', this)">CHILLOUT</button>
                    <button class="ui-btn radio-btn"
                        onclick="playRadio('DEEPHOUSE', 'https://strm112.1.fm/deephouse_mobile_mp3', this)">DEEPHOUSE</button>
                    <button class="ui-btn stop-btn"
                        onclick="stopRadio()" style="color: #007aff">STOP</button>
                </div>
            </div>
            <audio id="mainPlayer" hidden></audio>
        </div>
        <div class="glass-card">
            <div class="links-title">Links</div>
            <div class="links-grid">
                <a href="https://my.racknerd.com/aff.php?aff=13461" class="ui-btn" target="_blank">VPS</a>
                <a href="https://www.eevpn66.com/#/register?code=k9plQH3v" class="ui-btn" target="_blank">VPN</a>
                <a href="CSE/" class="ui-btn" target="_blank">CSE</a>
                <a href="2048/" class="ui-btn" target="_blank">2048</a>
                <a href="iina://weblink?url=https://caseu.org/IPTV.m3u" class="ui-btn">IPTV</a>
            </div>
        </div>
    </div>
    <footer>© 2026 CASEY<span class="blink">.</span></footer>
    <script>
        const player = document.getElementById('mainPlayer');
        const statusText = document.getElementById('status');
        const visualizer = document.getElementById('visualizer');
        document.addEventListener('DOMContentLoaded', () => {
            if (player) player.volume = 0.8;
        });
        player.onplay = () => visualizer.classList.add('active');
        player.onpause = () => visualizer.classList.remove('active');
        player.onended = () => visualizer.classList.remove('active');
        player.onerror = () => { statusText.innerText = "Offline"; visualizer.classList.remove('active'); };
        function search(engine) {
            const query = document.getElementById('searchInput').value;
            if (!query) return;
            const urls = {
                google: `https://www.google.com/search?q=${query}`,
                baidu: `https://www.baidu.com/s?wd=${query}`,
                bing: `https://www.bing.com/search?q=${query}`
            };
            window.open(urls[engine], '_blank');
        }
        function playRadio(name, url, btn) {
            document.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            statusText.innerText = `Connecting...`;
            player.src = url;
            player.play().catch(() => {
                statusText.innerText = "Tap to play";
                visualizer.classList.remove('active');
            });
            player.onplaying = () => {
                statusText.innerText = `Playing ${name}`;
                visualizer.classList.add('active');
            };
        }
        function stopRadio() {
            player.pause();
            player.src = "";
            player.load();
            statusText.innerText = "READY";
            visualizer.classList.remove('active');
            document.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('active'));
        }
    </script>
</body>

</html>

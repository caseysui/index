[General]
update-url = https://caseu.org/LAN.conf
bypass-system = true
skip-proxy = localhost,100.64.0.0/10,224.0.0.0/4,*.local,*.lan,captive.apple.com,seed-menu.icloud.com
tun-excluded-routes = 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 224.0.0.0/4, 239.255.255.250/32, 255.255.255.255/32
ipv6 = false
prefer-ipv6 = false
dns-server = system
fallback-dns-server = system
dns-direct-system = false
always-reject-url-rewrite = false
private-ip-answer = true
dns-direct-fallback-proxy = true
icmp-auto-reply = true
udp-policy-not-supported-behaviour = REJECT
block-quic = all-proxy

[Rule]
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/China/China.list,DIRECT
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Global/Global.list,PROXY
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Lan/Lan.list,DIRECT

GEOIP,CN,DIRECT
FINAL,DIRECT,dns-failed

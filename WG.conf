[General]
update-url = https://caseu.org/WG.conf
always-reject-url-rewrite = false
block-quic = all-proxy
bypass-system = true
dns-direct-fallback-proxy = true
dns-direct-system = false
dns-server = system
fallback-dns-server = system
icmp-auto-reply = true
icmp-auto-reply = true
ipv6 = false
prefer-ipv6 = false
private-ip-answer = true
skip-proxy = localhost, 100.64.0.0/10, 172.16.0.0/12, 224.0.0.0/4, *.local, *.lan, captive.apple.com, seed-menu.icloud.com
tun-excluded-routes = 127.0.0.0/8, 100.64.0.0/10, 169.254.0.0/16, 172.16.0.0/12, 224.0.0.0/4, 239.255.255.250/32, 255.255.255.255/32
udp-policy-not-supported-behaviour = REJECT
use-local-host-item-for-proxy = false

[Rule]
IP-CIDR,192.168.2.0/24,OP,no-resolve
IP-CIDR,192.168.110.0/24,QNAS,no-resolve
IP-CIDR,192.168.150.0/24,QNAS,no-resolve

DOMAIN-SUFFIX,copilot.microsoft.com,PROXY

RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Apple/Apple.list,DIRECT
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/China/China.list,DIRECT
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Global/Global.list,PROXY
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Lan/Lan.list,DIRECT

GEOIP,CN,DIRECT
FINAL,PROXY,dns-failed
